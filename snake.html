<!DOCTYPE html>
<html>
<head>
<title>MY Snake Game</title>
<style>
body {
  background-color: #6a2020;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
}

#game-board {
  background-color: #0e0909d3;
  border: 2px solid #7b7a7a;
  padding: 20px;
  display:grid;
  grid-template-columns: repeat(20, 20px); /* Adjust grid size */
  grid-template-rows: repeat(20, 20px);
}

.snake {
  background-color: rgb(255, 255, 255);
  border-radius: 25%; /* Make snake round */
}

.food {
  background-color: rgba(127, 234, 56, 0.696);
  border-radius: 39%; /* Make food round */
}

#score {
    margin-top: 20px;
    padding-bottom: 500px;
    padding-left: 300px;
    text-align: center;
    font-size: 29px;
    font-weight: 600;
    color:aliceblue;
}

</style>
</head>
<body>

<div id="game-board"></div>
<div id="score">Score: 0</div>

<script>
const gameBoard = document.getElementById('game-board');
const scoreDisplay = document.getElementById('score');
const gridSize = 20; // Consistent grid size

let snake = [{ x: 10, y: 10 }]; // Initial snake position
let food = { x: 15, y: 10 };  // Initial food position
let dx = 1; // Initial horizontal velocity
let dy = 0; // Initial vertical velocity
let score = 0;
let gameInterval;

function drawSnake() {
  gameBoard.innerHTML = ''; // Clear board

  snake.forEach(segment => {
    const snakeElement = document.createElement('div');
    snakeElement.classList.add('snake');
    snakeElement.style.gridColumnStart = segment.x;
    snakeElement.style.gridRowStart = segment.y;
    gameBoard.appendChild(snakeElement);
  });
}

function drawFood() {
    const foodElement = document.createElement('div');
    foodElement.classList.add('food');
    foodElement.style.gridColumnStart = food.x;
    foodElement.style.gridRowStart = food.y;
    gameBoard.appendChild(foodElement);
}


function moveSnake() {
  const head = { x: snake[0].x + dx, y: snake[0].y + dy };
  snake.unshift(head); // Add new head

  if (head.x === food.x && head.y === food.y) {
      score++;
      scoreDisplay.textContent = "Score: " + score;
      generateFood();
  } else {
      snake.pop(); // Remove tail
  }
}

function checkCollision() {
    const head = snake[0];

    if (head.x < 1 || head.x > gridSize || head.y < 1 || head.y > gridSize || selfCollision()) {
        clearInterval(gameInterval);
        alert("Game Over!");
        location.reload(); // Restart the game
    }
}

function selfCollision() {
    for (let i = 1; i < snake.length; i++) {
        if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) {
            return true;
        }
    }
    return false;
}

function generateFood() {
    food = {
        x: Math.floor(Math.random() * gridSize) + 1,
        y: Math.floor(Math.random() * gridSize) + 1
    };

    // Ensure food doesn't spawn inside the snake
    if (snake.some(segment => segment.x === food.x && segment.y === food.y)) {
        generateFood(); // Regenerate if it's inside the snake
    }
}


function gameLoop() {
  moveSnake();
  checkCollision();
  drawSnake();
  drawFood();
}

function changeDirection(event) {
    const LEFT_KEY = 37;
    const UP_KEY = 38;
    const RIGHT_KEY = 39;
    const DOWN_KEY = 40;

    const keyPressed = event.keyCode;

    const goingUp = dy === -1;
    const goingDown = dy === 1;
    const goingRight = dx === 1;
    const goingLeft = dx === -1;

    if (keyPressed === LEFT_KEY && !goingRight) {
        dx = -1;
        dy = 0;
    }

    if (keyPressed === UP_KEY && !goingDown) {
        dx = 0;
        dy = -1;
    }

    if (keyPressed === RIGHT_KEY && !goingLeft) {
        dx = 1;
        dy = 0;
    }

    if (keyPressed === DOWN_KEY && !goingUp) {
        dx = 0;
        dy = 1;
    }
}

document.addEventListener('keydown', changeDirection);

generateFood();
gameInterval = setInterval(gameLoop, 100); // Adjust speed here

</script>

</body>
</html>
